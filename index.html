<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rappi | Centro de Capacitación</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f2f2f2; }
    header { background: #ff441f; color: white; padding: 15px; text-align: center; }
    .topbar { display:flex; gap:10px; padding:10px; background:white; position:sticky; top:0; }
    input { flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; }
    select { padding:10px; border-radius:8px; }
    .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
    .card { background: white; border-radius: 14px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    video, img { width: 100%; border-radius: 10px; }
    .btn { display: inline-block; margin-top: 8px; padding: 8px 12px; background: #ff441f; color: white; text-decoration: none; border-radius: 8px; }
    .hidden { display:none; }
  </style>
</head>
<body>

<header>
  <h2>Centro de Capacitación Rappi</h2>
</header>

<div class="topbar">
  <input type="text" id="search" placeholder="Buscar contenido...">
  <select id="filter">
    <option value="all">Todo</option>
    <option value="pagos">Pagos</option>
    <option value="entregas">Entregas</option>
    <option value="cancelaciones">Cancelaciones</option>
  </select>
</div>

<div class="container">

  <div class="card" data-title="tienda cerrada cancelaciones" data-cat="cancelaciones">
    <h3>Tienda Cerrada</h3>
    <img src="imagenes/tienda-cerrada.jpg">
    <a class="btn" href="imagenes/tienda-cerrada.jpg" download>Descargar</a>
  </div>

  <div class="card" data-title="pago oxxo pagos" data-cat="pagos">
    <h3>Pago en Oxxo</h3>
    <video controls>
      <source src="videos/pago-oxxo.mp4" type="video/mp4">
    </video>
    <a class="btn" href="videos/pago-oxxo.mp4" download>Descargar</a>
  </div>

  <div class="card" data-title="entrega segura entregas" data-cat="entregas">
    <h3>Entrega Segura</h3>
    <video controls>
      <source src="videos/entrega-segura.mp4" type="video/mp4">
    </video>
    <a class="btn" href="videos/entrega-segura.mp4" download>Descargar</a>
  </div>

  <div class="card" data-title="finalizar orden entregas" data-cat="entregas">
    <h3>Finalizar Orden</h3>
    <video controls>
      <source src="videos/finalizar-orden.mp4" type="video/mp4">
    </video>
    <a class="btn" href="videos/finalizar-orden.mp4" download>Descargar</a>
  </div>

</div>

<script>
const search = document.getElementById('search');
const filter = document.getElementById('filter');
const cards = document.querySelectorAll('.card');

function update() {
  const text = search.value.toLowerCase();
  const cat = filter.value;

  cards.forEach(card => {
    const title = card.dataset.title;
    const matchText = title.includes(text);
    const matchCat = cat === 'all' || card.dataset.cat === cat;

    card.style.display = (matchText && matchCat) ? 'block' : 'none';
  });
}

search.addEventListener('input', update);
filter.addEventListener('change', update);
</script>

</body>
</html>
