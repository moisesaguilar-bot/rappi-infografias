<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rappi | Centro de Capacitación</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f2f2f2; }
    header { background: #ff441f; color: white; padding: 15px; text-align: center; }
    .topbar { display:flex; gap:10px; padding:10px; background:white; position:sticky; top:0; z-index:10; }
    input { flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; }
    select { padding:10px; border-radius:8px; }
    .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
    .card { background: white; border-radius: 14px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    video, img { width: 100%; border-radius: 10px; background-color: #000; } /* Fondo negro para videos mientras cargan */
    .btn { display: inline-block; margin-top: 8px; padding: 8px 12px; background: #ff441f; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; }
    .hidden { display:none; }
  </style>
</head>
<body>

<header>
  <h2>Centro de Capacitación Rappi</h2>
</header>

<div class="topbar">
  <input type="text" id="search" placeholder="Buscar contenido...">
  <select id="filter">
    <option value="all">Todo</option>
    <option value="pagos">Pagos</option>
    <option value="entregas">Entregas</option>
    <option value="cancelaciones">Cancelaciones</option>
  </select>
</div>

<div class="container" id="content">

  <div class="card" data-title="tienda cerrada cancelaciones" data-cat="cancelaciones">
    <h3>Tienda Cerrada</h3>
    <img src="imagenes/tienda-cerrada.jpg" alt="Tienda Cerrada">
    <a class="btn" href="imagenes/tienda-cerrada.jpg" download="tienda-cerrada.jpg">Descargar</a>
